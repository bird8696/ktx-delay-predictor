name: 매일 데이터 수집 & 모델 재학습

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 3.11 설정
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install pandas numpy scikit-learn requests python-dotenv anthropic joblib plotly streamlit

      - name: 환경변수 설정
        run: |
          echo "KORAIL_API_KEY=${{ secrets.KORAIL_API_KEY }}" >> .env
          echo "TAGO_API_KEY=${{ secrets.TAGO_API_KEY }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env

      - name: 데이터 수집 & 모델 재학습
        run: python scheduler.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ models/saved/
          git diff --staged --quiet || git commit -m "자동 업데이트: $(date '+%Y-%m-%d') 데이터 수집 & 재학습"
          git push
